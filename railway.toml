[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "bash download_models.sh && npm run db:push && node -e \"const fs=require('fs'); console.log('dist exists:', fs.existsSync('/app/dist')); console.log('dist/public exists:', fs.existsSync('/app/dist/public'));\" && npm start"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[env]
PYTHONUNBUFFERED = "1"
OPENCV_VIDEOIO_PRIORITY_MSMF = "0"
