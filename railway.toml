[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "bash /app/download_models.sh && node /app/dist/index.js 2>&1 | tee /tmp/startup.log; cat /tmp/startup.log"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[env]
PYTHONUNBUFFERED = "1"
OPENCV_VIDEOIO_PRIORITY_MSMF = "0"
