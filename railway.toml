[build]
builder = "NIXPACKS"
buildCommand = "npm run build"
# We only add the bare-minimum C++ and compression runtimes
# and ensure Python 3 is explicitly available alongside Node
nixpacksPlan = { providers = ["node", "python"], aptPackages = ["libstdc++6", "zlib1g", "libsm6"] }

[deploy]
startCommand = "npm start"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
