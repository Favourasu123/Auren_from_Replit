[build]
builder = "NIXPACKS"
buildCommand = "pip install -r requirements.txt --break-system-packages && npm run build"
nixpacksPlan = { providers = ["node", "python"], aptPackages = ["libstdc++6", "zlib1g", "wget"] }

[deploy]
startCommand = "bash download_models.sh && npm run db:push && npm start"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[env]
PYTHONUNBUFFERED = "1"
OPENCV_VIDEOIO_PRIORITY_MSMF = "0"
